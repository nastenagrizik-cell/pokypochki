<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Совместные покупки</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Перейти к содержимому</a>

  <header class="topbar">
    <div class="top-actions left-actions">
      <button id="projects-toggle" class="ghost-btn" type="button">Проекты</button>
      <button id="new-project-btn" class="ghost-btn plus-btn" type="button">+</button>
    </div>

    <div class="top-center">
      <h1 id="project-title">Совместные покупки</h1>
      <div class="progress-wrap">
        <div class="progress-meta">
          <span id="progress-label">Нет активного проекта</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar"><span id="progress-fill"></span></div>
      </div>
    </div>

    <div class="top-actions right-actions">
      <button id="participants-toggle" class="ghost-btn" type="button">Участники</button>
      <button class="icon-btn" type="button" data-theme-toggle aria-label="Переключить тему">◐</button>
    </div>
  </header>

  <section id="projects-panel" class="top-panel hidden">
    <div id="projects-list" class="projects-list"></div>
  </section>

  <section id="participants-panel" class="top-panel hidden">
    <div class="panel-row">
      <div id="participants-list" class="participants-list"></div>
    </div>
    <form id="participant-form" class="mini-form participant-mini-form">
      <input id="participant-name" name="name" type="text" placeholder="Добавить участника" required />
      <button class="ghost-btn mini-btn" type="submit">+</button>
    </form>
  </section>

  <main id="main" class="main-layout">
    <section class="add-card">
      <form id="item-form" class="mini-form add-item-form">
        <input name="title" type="text" placeholder="Что купить" required />
        <input name="quantity" type="number" min="0" step="0.1" placeholder="Кол-во (необязательно)" />
        <select name="unit" id="unit-select"></select>
        <select name="assignedTo" id="assigned-to-select"></select>
        <input name="comment" type="text" placeholder="Комментарий" />
        <button class="ghost-btn mini-btn add-submit" type="submit">Добавить</button>
      </form>
    </section>

    <section class="list-card">
      <div class="list-head">
        <h2>Список покупок</h2>
        <p class="muted">Сначала активные, затем выполненные.</p>
      </div>
      <div id="items-list" class="items-list"></div>
    </section>
  </main>

  <dialog id="project-modal" class="modal">
    <form id="project-form" class="modal-card" method="dialog">
      <div class="panel-head">
        <strong>Новый проект</strong>
        <button id="close-project-modal" class="icon-btn" type="button">✕</button>
      </div>
      <input name="name" type="text" placeholder="Название проекта" required />
      <textarea name="description" placeholder="Короткое описание"></textarea>
      <button class="ghost-btn create-project-btn" type="submit">Создать</button>
    </form>
  </dialog>

  <script src="./app.js" defer></script>
</body>
</html>
