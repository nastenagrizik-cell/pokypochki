<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Совместные покупки</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Перейти к содержимому</a>

  <header class="topbar">
    <div class="topbar-left">
      <button id="projects-toggle" class="ghost-btn" type="button">Проекты</button>
      <button id="new-project-btn" class="ghost-btn strong" type="button">+ Проект</button>
    </div>
    <div class="topbar-center">
      <h1 id="project-title">Совместные покупки</h1>
      <div id="progress-inline" class="progress-inline"></div>
    </div>
    <div class="topbar-right">
      <button id="participants-toggle" class="ghost-btn" type="button">Участники</button>
      <button class="icon-btn" type="button" data-theme-toggle aria-label="Переключить тему">◐</button>
    </div>
  </header>

  <div id="projects-panel" class="top-panel hidden">
    <div class="panel-head">
      <strong>Все проекты</strong>
    </div>
    <div id="projects-list" class="projects-list"></div>
  </div>

  <div id="participants-panel" class="top-panel hidden">
    <div class="panel-head panel-head-wrap">
      <strong>Участники проекта</strong>
      <form id="participant-form" class="participant-form-inline">
        <input id="participant-name" name="name" type="text" placeholder="Добавить участника" required />
        <button class="ghost-btn strong" type="submit">Добавить</button>
      </form>
    </div>
    <div id="participants-list" class="participants-list"></div>
  </div>

  <main id="main" class="main-layout">
    <section class="add-row-card">
      <form id="item-form" class="add-item-row">
        <input name="title" type="text" placeholder="Что купить" required />
        <input name="quantity" type="number" min="0" step="0.1" placeholder="Кол-во" required />
        <select name="unit" id="unit-select"></select>
        <select name="assignedTo" id="assigned-to-select"></select>
        <input name="comment" type="text" placeholder="Комментарий" />
        <button class="primary-btn" type="submit">Добавить</button>
      </form>
    </section>

    <section class="list-card">
      <div class="list-head">
        <div>
          <h2>Список покупок</h2>
          <p id="list-subtitle" class="muted">Все активные покупки сверху, завершенные — внизу.</p>
        </div>
      </div>
      <div id="items-list" class="items-list"></div>
    </section>
  </main>

  <dialog id="project-modal" class="modal">
    <form id="project-form" class="modal-card" method="dialog">
      <div class="panel-head">
        <strong>Новый проект</strong>
        <button id="close-project-modal" class="icon-btn" type="button">✕</button>
      </div>
      <input name="name" type="text" placeholder="Название проекта" required />
      <textarea name="description" placeholder="Короткое описание"></textarea>
      <button class="primary-btn" type="submit">Создать</button>
    </form>
  </dialog>

  <script src="./app.js" defer></script>
</body>
</html>
